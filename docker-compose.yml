version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: chat-query-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  backend:
    build:
      context: .
      dockerfile: Project/IA/Dockerfile
    container_name: chat-query-backend
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - SUPABASE_URL=http://host.docker.internal:54321
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    restart: always

volumes:
  redis_data:
