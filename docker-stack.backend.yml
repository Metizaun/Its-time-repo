services:
  api:
    image: ${BACKEND_IMAGE}
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_KEY: ${SUPABASE_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-gpt-4o-mini-transcribe}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-4.1-mini}
      ELEVENLABS_TTS_ENABLED: ${ELEVENLABS_TTS_ENABLED:-false}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_DEFAULT_VOICE_ID: ${ELEVENLABS_DEFAULT_VOICE_ID:-}
      ELEVENLABS_TTS_MODEL: ${ELEVENLABS_TTS_MODEL:-eleven_flash_v2_5}
      ELEVENLABS_OUTPUT_FORMAT: ${ELEVENLABS_OUTPUT_FORMAT:-mp3_44100_128}
      TOOL_MEDIA_ALLOWED_HOSTS: ${TOOL_MEDIA_ALLOWED_HOSTS:-}
      VISAGISM_TOOL_ENABLED: ${VISAGISM_TOOL_ENABLED:-false}
      VISAGISM_INTERNAL_RUNTIME_ENABLED: ${VISAGISM_INTERNAL_RUNTIME_ENABLED:-true}
      VISAGISM_ANALYSIS_WORKER_MODEL: ${VISAGISM_ANALYSIS_WORKER_MODEL:-gemini-2.5-flash}
      VISAGISM_MATCHING_WORKER_MODEL: ${VISAGISM_MATCHING_WORKER_MODEL:-gemini-2.5-flash}
      VISAGISM_IMAGE_WORKER_MODEL: ${VISAGISM_IMAGE_WORKER_MODEL:-gpt-image-1}
      PRESCRIPTION_WORKER_ENABLED: ${PRESCRIPTION_WORKER_ENABLED:-true}
      PRESCRIPTION_WORKER_MODEL: ${PRESCRIPTION_WORKER_MODEL:-gemini-2.5-flash}
      REDIS_URL: ${REDIS_URL_FOR_CONTAINER}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_WEBHOOK_SECRET: ${EVOLUTION_WEBHOOK_SECRET}
      GUPSHUP_WEBHOOK_SECRET: ${GUPSHUP_WEBHOOK_SECRET}
      META_PROVIDER_MODE: ${META_PROVIDER_MODE}
      META_GRAPH_API_VERSION: ${META_GRAPH_API_VERSION}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN}
      META_WEBHOOK_APP_SECRET: ${META_WEBHOOK_APP_SECRET}
      META_WEBHOOK_APP_SECRET_REF: ${META_WEBHOOK_APP_SECRET_REF}
      META_TEMPLATES_FIXTURE_PATH: ${META_TEMPLATES_FIXTURE_PATH}
      WEBHOOK_PUBLIC_BASE_URL: ${WEBHOOK_PUBLIC_BASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      PORT: ${API_PORT}
      NODE_ENV: production
      AUTOMATION_WORKER_ENABLED: ${AUTOMATION_WORKER_ENABLED}
      AUTOMATION_WORKER_POLL_MS: ${AUTOMATION_WORKER_POLL_MS}
      AUTOMATION_WORKER_BATCH_SIZE: ${AUTOMATION_WORKER_BATCH_SIZE}
      RB_BILLING_WORKER_ENABLED: ${RB_BILLING_WORKER_ENABLED:-false}
      RB_BILLING_WORKER_POLL_MS: ${RB_BILLING_WORKER_POLL_MS:-60000}
      BI_PROJECTION_WORKER_ENABLED: ${BI_PROJECTION_WORKER_ENABLED:-false}
      BI_PROJECTION_BATCH_SIZE: ${BI_PROJECTION_BATCH_SIZE:-100}
      CALENDAR_FOLLOWUP_ENABLED: ${CALENDAR_FOLLOWUP_ENABLED:-false}
      CALENDAR_FOLLOWUP_DRY_RUN: ${CALENDAR_FOLLOWUP_DRY_RUN:-false}
      CALENDAR_FOLLOWUP_BATCH_SIZE: ${CALENDAR_FOLLOWUP_BATCH_SIZE:-25}
      CALENDAR_FOLLOWUP_1H_TEMPLATE: '${CALENDAR_FOLLOWUP_1H_TEMPLATE:-Ola, {nome}! Passando para lembrar do compromisso "{titulo}" hoje as {horario}.}'
    networks:
      - traefik-public
    deploy:
      replicas: ${BACKEND_REPLICAS}
      placement:
        constraints:
          - node.hostname == ${SWARM_NODE_HOSTNAME}
      restart_policy:
        condition: any
      update_config:
        order: ${BACKEND_UPDATE_ORDER:-start-first}
        failure_action: rollback
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=${TRAEFIK_NETWORK}"
        - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.rule=Host(`${API_DOMAIN}`)"
        - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.entrypoints=${TRAEFIK_ENTRYPOINTS}"
        - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.tls=true"
        - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.tls.certresolver=${TRAEFIK_CERT_RESOLVER}"
        - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.service=${TRAEFIK_SERVICE_NAME}"
        - "traefik.http.services.${TRAEFIK_SERVICE_NAME}.loadbalancer.server.port=${API_PORT}"
        - "traefik.http.services.${TRAEFIK_SERVICE_NAME}.loadbalancer.passhostheader=true"

networks:
  traefik-public:
    external: true
    name: ${TRAEFIK_NETWORK}
